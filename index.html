<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quantum Trades Edge</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>QUANTUM TRADES EDGE</h1>

        <p class="author">
            By JandreScalper
        </p>

        <p class="subtitle">
            ORB Strategy - Smart Structure - Scalping
        </p>

        <nav class="navbar">

            <button>📊 Dashboard</button>

            <button>📈 Trades</button>

            <button>📉 Analytics</button>

            <button>🧮 Risk</button>

        </nav>

        <div class="dashboard">

            <div class="card">
                <h3>Balance</h3>
                <span>$10,000</span>
            </div>

            <div class="card">
                <h3>Daily DD</h3>
                <span>$0</span>
            </div>

            <div class="card">
                <h3>Win Rate</h3>
                <span>0%</span>
            </div>

            <div class="card">
                <h3>Profit Factor</h3>
                <span>0.00</span>
            </div>

            <div class="card">
                <h3>Total Trades</h3>
                <span>0</span>
            </div>

            <div class="card">
                <h3>Best Setup</h3>
                <span>ORB</span>
            </div>

        </div>

    </div>
<section class="trade-form">

    <h2>Nuevo Trade</h2>

    <select id="symbol">
        <option>US100</option>
        <option>US30</option>
        <option>XAUUSD</option>
    </select>

    <select id="setup">
        <option>ORB</option>
        <option>Silver Bullet</option>
        <option>Smart Structure</option>
        <option>Open Drive</option>
    </select>

    <select id="direction">
        <option>BUY</option>
        <option>SELL</option>
    </select>

    <input type="number" placeholder="Resultado ($)">

    <input type="text" placeholder="R:R">

    <button class="save-btn">
        Guardar Trade
    </button>

</section>
    <script src="js/app.js"></script>

</body>

</html>
